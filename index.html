    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif; background-color: #ABC1D1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    #nickname-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    #nickname-modal.hidden { display: none; }
    .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; }
    .profile-circle { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 20px; overflow: hidden; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: bold; }
    .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
    h2 { color: #666; margin-bottom: 20px; font-size: 18px; font-weight: normal; }
    input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 15px; }
    .confirm-btn { width: 100%; padding: 15px; background: #5472d8; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }

    #chat-container { display: none; background: #ABC1D1; max-width: 600px; width: 100%; height: 100vh; overflow-y: auto; }
    #chat-container.visible { display: block; }
    .date-navigator { position: sticky; top: 0; background: #9db4c7; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; }
    .nav-btn { background: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .current-date { font-weight: bold; color: #333; font-size: 14px; cursor: pointer; padding: 8px 15px; border-radius: 10px; }

    #calendar-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 200; justify-content: center; align-items: center; }
    #calendar-modal.visible { display: flex; }
    .calendar-content { background: white; padding: 20px; border-radius: 15px; max-width: 350px; width: 90%; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    #calendar-body { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    #calendar-body.day-grid { grid-template-columns: repeat(7, 1fr); }
    .calendar-item { padding: 10px; background: #f0f0f0; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; }
    .calendar-item:hover { background: #5472d8; color: white; }
    .calendar-item.has-data { background: #e3f2fd; border: 1px solid #5472d8; font-weight: bold; }
    .close-calendar { width: 100%; margin-top: 15px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }

    .message { display: flex; padding: 4px 20px; align-items: flex-start; }
    .message.continued { padding-top: 0; padding-bottom: 2px; }
    .message .profile-area { width: 42px; margin-right: 10px; flex-shrink: 0; }
    .message .profile { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
    .message-content { flex: 1; }
    .message .name { font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #333; }
    .bubble-wrapper { display: flex; align-items: flex-end; gap: 5px; }
    
    .message .bubble { 
        background: white; 
        padding: 10px 14px; 
        border-radius: 0 15px 15px 15px; 
        display: inline-block; 
        max-width: 350px; 
        word-wrap: break-word; 
        line-height: 1.4; 
        font-size: 15px; /* 기본 크기 */
    }
    
    .message.continued .bubble { border-radius: 15px; }
    .message .bubble.photo { padding: 0; background: transparent; }
    .message .bubble.sticker { padding: 0; background: transparent; }
    .message .bubble.sticker img { width: 120px !important; max-height: 120px; }
    .message .bubble img { max-width: 100%; max-height: 400px; border-radius: 10px; display: block; }
    .message .time { font-size: 11px; color: rgba(0, 0, 0, 0.4); white-space: nowrap; }

    /* --- 추가: 동영상 다운로드 버튼 스타일 --- */
    .video-wrapper { display: flex; flex-direction: column; gap: 5px; }
    .download-btn { 
        display: inline-block; padding: 4px 8px; background: rgba(255,255,255,0.5); 
        color: #555; text-decoration: none; border-radius: 5px; font-size: 10px; 
        border: 1px solid #ddd; text-align: center; width: fit-content;
    }

    /* --- 추가: 모바일 글자 크기 최적화 --- */
    @media screen and (max-width: 480px) {
        .message .bubble { font-size: 13.5px; padding: 8px 12px; max-width: 260px; }
        .message .name { font-size: 11px; }
        .message .time { font-size: 9px; }
        .current-date { font-size: 12px; }
        .message .profile-area, .message .profile { width: 35px; height: 35px; }
    }
</style>

        const dateKeys = Object.keys(allChats);
        let currentDateIndex = 0;
        let userNickname = "";

        function setNickname() {
            const nick = document.getElementById('nickname-input').value.trim();
            if (nick) {
                userNickname = nick;
                document.getElementById('nickname-modal').classList.add('hidden');
                document.getElementById('chat-container').classList.add('visible');
                loadMessages();
            }
        }

        function loadMessages() {
            const data = allChats[dateKeys[currentDateIndex]];
            if(!data) return;
            document.getElementById('current-date-display').textContent = data.displayDate;
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            let lastTime = "";

            data.messages.forEach((msg) => {
                const isContinued = (msg.time === lastTime);
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isContinued ? 'continued' : ''}`;
                
                // 프로필 영역
                const profileArea = document.createElement('div');
                profileArea.className = 'profile-area';
                if (!isContinued) {
                    const profileImg = document.createElement('img');
                    profileImg.src = 'images/profile.jpg';
                    profileImg.className = 'profile';
                    profileImg.onerror = function() {
                        this.style.display='none';
                        this.parentElement.innerHTML='키';
                    };
                    profileArea.appendChild(profileImg);
                }
                messageDiv.appendChild(profileArea);

                // 메시지 내용
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                
                if (!isContinued) {
                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'name';
                    nameDiv.textContent = '키욱이';
                    contentDiv.appendChild(nameDiv);
                }

                // 말풍선 + 시간
                const bubbleWrapper = document.createElement('div');
                bubbleWrapper.className = 'bubble-wrapper';

                const bubbleDiv = document.createElement('div');
                
                // --- 이 부분이 핵심 수정 사항입니다 ---
                if (msg.type === 'photo') {
                    bubbleDiv.className = 'bubble photo';
                    const img = document.createElement('img');
                    img.src = msg.content;
                    img.loading = 'lazy'; // 이 줄을 추가하세요! (보이는 것만 로딩함)
                    bubbleDiv.appendChild(img);
                } else if (msg.type === 'sticker') {
                    bubbleDiv.className = 'bubble sticker'; // CSS에 정의한 sticker 스타일 적용
                    const img = document.createElement('img');
                    img.src = msg.content;
                    bubbleDiv.appendChild(img);
                }  else if (msg.type === 'video') {
                    bubbleDiv.className = 'bubble photo';
                    
                    // 비디오와 다운로드 버튼을 묶을 컨테이너
                    const videoWrapper = document.createElement('div');
                    videoWrapper.className = 'video-wrapper';

                    const video = document.createElement('video');
                    video.src = msg.content;
                    video.controls = true;
                    video.playsInline = true;
                    video.style.maxWidth = '100%';
                    video.style.borderRadius = '10px';
                    video.style.display = 'block';

                    // 다운로드 버튼 생성
                    const downloadLink = document.createElement('a');
                    downloadLink.href = msg.content;
                    // 파일명을 'hambubble_파일명'으로 설정
                    downloadLink.download = `hambubble_${originalFileName}`;
                    downloadLink.className = 'download-btn';
                    downloadLink.textContent = '영상 저장 ⬇️';

                    videoWrapper.appendChild(video);
                    videoWrapper.appendChild(downloadLink);
                    bubbleDiv.appendChild(videoWrapper);
                } else {
                    bubbleDiv.className = 'bubble';
                    const content = msg.content.replace(/@@@/g, userNickname);
                    bubbleDiv.innerHTML = content.replace(/\n/g, '<br>');
                }
                // ------------------------------------

                const timeDiv = document.createElement('div');
                timeDiv.className = 'time';
                timeDiv.textContent = msg.time;

                bubbleWrapper.appendChild(bubbleDiv);
                bubbleWrapper.appendChild(timeDiv);
                contentDiv.appendChild(bubbleWrapper);
                messageDiv.appendChild(contentDiv);
                
                messagesDiv.appendChild(messageDiv);
                lastTime = msg.time;
            });
            updateNavButtons();
            document.getElementById('chat-container').scrollTop = 0;
        }
        

        function openCalendar() { document.getElementById('calendar-modal').classList.add('visible'); showYearSelection(); }
        function closeCalendar() { document.getElementById('calendar-modal').classList.remove('visible'); }
        function showYearSelection() {
    const body = document.getElementById('calendar-body');
    body.classList.remove('day-grid');
    document.getElementById('calendar-title').textContent = "년도 선택";
    document.getElementById('back-btn').style.display = 'none';
    
    // 데이터(allChats)에 있는 모든 날짜 키값에서 년도만 추출하여 중복 제거
    const years = [...new Set(Object.keys(allChats).map(date => date.split('-')[0]))];
    
    // 오름차순 정렬 후 버튼 생성
    body.innerHTML = years.sort().map(year => 
        `<div class="calendar-item" onclick="selectYear(${year})">${year}</div>`
    ).join('');
}
        function selectYear(year) {
            const body = document.getElementById('calendar-body');
            body.classList.remove('day-grid');
            document.getElementById('calendar-title').textContent = `${year}년 월 선택`;
            document.getElementById('back-btn').style.display = 'block';
            body.innerHTML = '';
            for(let m=1; m<=12; m++) { body.innerHTML += `<div class="calendar-item" onclick="selectMonth(${year}, ${m})">${m}월</div>`; }
        }
        function selectMonth(year, month) {
            const body = document.getElementById('calendar-body');
            body.classList.add('day-grid');
            document.getElementById('calendar-title').textContent = `${year}년 ${month}월 일 선택`;
            body.innerHTML = '';
            const lastDay = new Date(year, month, 0).getDate();
            for(let d=1; d<=lastDay; d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasDataClass = allChats[dateStr] ? 'has-data' : '';
                body.innerHTML += `<div class="calendar-item ${hasDataClass}" onclick="selectDay('${dateStr}')">${d}</div>`;
            }
        }
        function selectDay(dateStr) {
            const index = dateKeys.indexOf(dateStr);
            if (index !== -1) { currentDateIndex = index; loadMessages(); closeCalendar(); }
            else { alert("기록이 없는 날짜입니다."); }
        }
        function changeDate(direction) {
            currentDateIndex = Math.max(0, Math.min(dateKeys.length - 1, currentDateIndex + direction));
            loadMessages();
        }
        function updateNavButtons() {
            const prev = document.getElementById('prev-btn');
            const next = document.getElementById('next-btn');
            if(prev) prev.disabled = currentDateIndex === 0;
            if(next) next.disabled = currentDateIndex === dateKeys.length - 1;
        }
    </script>
